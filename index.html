<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            padding: 12px;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 12px; /* razmak između radova */
        }

        .gallery img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px; /* možeš obrisati ako želiš potpuno ravne ivice */
        }
    </style>
</head>
<body>

<div class="gallery">
    <img src="design/istorija.png" alt="">
</div>

</body>
</html>
